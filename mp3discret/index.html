<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MP3DISCRET</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>MP3DISCRET</h1>
    </header>

    <main>
        <section class="search-section">
            <input type="text" id="searchInput" placeholder="Insert name or artist">
            <button onclick="searchAudio()">Search</button>
             <div id="loadingSpinner" style="display: none; text-align: center; margin-top: 10px;">
                 <div class="spinner"></div>
            </div>
        </section>

        <section id="results">
            <h2>Results</h2>
            <ul id="resultsList"></ul>
        </section>
    </main>

    <script>
        async function searchAudio() {          
        const input = document.getElementById('searchInput').value.trim();
        const list = document.getElementById('resultsList');
        const spinner = document.getElementById('loadingSpinner');

        list.innerHTML = '';
        spinner.style.display = 'block';

        if (!input) {
            alert("Please enter a name or artist.");
            spinner.style.display = 'none'; 
            return;
        }

        try {
            const response = await fetch(`http://localhost:8080/service/start/audio/track/mongo/search?query=${encodeURIComponent(input)}`);
    
            if (!response.ok) {
                throw new Error(`An error has occurred`);
            }

            const data = await response.json();
            spinner.style.display = 'none'; 

            if (!Array.isArray(data) || data.length === 0) {
                list.innerHTML = '<li>No results found.</li>';
                return;
            }

            const fragment = document.createDocumentFragment();
            data.forEach(audio => {
                const li = document.createElement('li');
                li.innerHTML = `${audio.metadata?.title} - ${audio.metadata?.artist || "Unknown"} (${audio.metadata?.formato || "N/A"}) |
                    <a href="http://localhost:8080/service/start/mongo/download/${audio.id}" target="_blank">Download</a>`;
                fragment.appendChild(li);
            });
            list.appendChild(fragment);

        } catch (err) {
            console.error('Fetch error:', err);
            spinner.style.display = 'none'; 
            list.innerHTML = `<li>An error has occurred ${err.message}</li>`;
        }
}
</script>
</script>
</body>
</html>
