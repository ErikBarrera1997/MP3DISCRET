<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MP3DISCRET</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css"> <!-- Puedes desacoplar el CSS -->
</head>
<body>
    <header>
        <h1>MP3DISCRET</h1>
    </header>

    <main>
        <section class="search-section">
            <input type="text" id="searchInput" placeholder="Insert the name or artist">
            <button onclick="searchAudio()">Search</button>
        </section>

        <section id="results">
            <h2>Results</h2>
            <ul id="resultsList"></ul>
        </section>
    </main>

    <script>
        async function searchAudio() {
            const query = document.getElementById('searchInput').value;
            const response = await fetch(`https://mp3discret.com/services/app/audio/track/search?query=${encodeURIComponent(query)}`);
            const audios = await response.json();

            const list = document.getElementById('resultsList');
            list.innerHTML = '';

            audios.forEach(audio => {
                const li = document.createElement('li');
                li.innerHTML = `${audio.name} - ${audio.artist} (${audio.format}) | 
                    <a href="https://mp3discret.com/services/app/download/${audio.id}" target="_blank">Download</a>`;
                list.appendChild(li);
            });
        }
    </script>
</body>
</html>
